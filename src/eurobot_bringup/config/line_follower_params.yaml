line_follower:
  ros__parameters:
    camera_topic: /robot6/camera/image_raw
    cmd_vel_topic: /robot6/cmd_vel
    debug_image_topic: /robot6/debug/line_mask
    track_topic: /robot6/camera/image_raw
    mask_topic: /robot6/debug/line_mask
    line_color: black
    roi_top_fraction: 0.60
    base_speed: 0.18
    reduced_speed: 0.09
    max_angular: 1.2
    kp: 0.9
    ki: 0.0002
    kd: 0.18
    integral_limit: 1.2
    min_contour_area: 700.0
    error_alpha: 0.35
    center_deadband: 0.04
    max_angular_step: 0.12
    show_mask: true
    window_scale: 1.0
    lost_stop: true
    publish_debug_image: true
